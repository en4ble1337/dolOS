version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - agent-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - agent-network
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  agent:
    build: .
    container_name: dolos-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override localhost defaults for Docker networking
      - OLLAMA_API_BASE=http://ollama:11434
      - DATA_DIR=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./directives:/app/directives
      - ./skills:/app/skills
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  qdrant_storage:
  ollama_data:
